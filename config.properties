# ===================================================================
# ZenJavaRobot — Configuration
# ===================================================================

# OneBot v11 reverse-WebSocket server settings
onebot.host=0.0.0.0
onebot.port=6198
onebot.access_token=

# Message sending switch
# true  = actually call OneBot API to send messages to QQ
# false = only print [DRY-RUN] log, do not send messages (debug mode)
send_enabled=false

# Admin QQ numbers (comma-separated)
admins=

# Plugin list (JAR filenames in plugins/ directory, comma-separated)
# Order determines event dispatch priority — earlier plugins get events first
plugins=echo-plugin.jar
